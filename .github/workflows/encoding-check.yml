name: Encoding Check

on:
  push:
  pull_request:

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check UTF-8 encoding
        run: python scripts/check_encoding.py
