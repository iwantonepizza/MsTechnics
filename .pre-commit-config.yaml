default_language_version:
  python: python3.12

repos:
  # ---------------------------------------------------------------------------
  # Общие хуки: пробелы, yaml, json, секреты, дебаг
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key   # ловит приватные ключи RSA/SSH
      - id: debug-statements     # ловит breakpoint() и pdb

  # ---------------------------------------------------------------------------
  # Ruff — линтер + форматтер (заменяет flake8 + isort)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Black — форматтер (финальный проход)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12

  # ---------------------------------------------------------------------------
  # Mypy — статическая типизация
  # Запускаем только на changed files, не на всём репо
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs[compatible-mypy]>=5.0
          - djangorestframework-stubs>=3.15
        args: [--ignore-missing-imports]
        # Исключаем миграции и legacy-скрипты из корня
        exclude: ^(migrations/|.+/migrations/|manage\.py|sender_tg_message\.py|ManageControl\.py|daily_checker\.py|sorting_message\.py|get_time\.py)
