openapi: 3.0.3
info:
  title: MsTechnics API
  version: 1.0.0
  description: REST API for MS Technics.
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      summary: Вход
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '401':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        T-3-fix-002 / B4: Правильная rotation с blacklist старого токена.

        - Читаем refresh из httpOnly cookie
        - Blacklist старый токен (предотвращаем повторное использование)
        - Создаём новый refresh + access для того же юзера
        - Отдаём access в JSON, новый refresh в cookie
      summary: Обновить токен
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '401':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      summary: Выход
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '204':
          description: Успешно
