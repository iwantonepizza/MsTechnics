services:
  db:
    image: postgres:16-alpine
    env_file:
      - Config/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: ms-service:1.0.1
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - Config/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: >
      bash -c "python manage.py migrate &&
               python manage.py collectstatic --noinput &&
               gunicorn project_config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: always

volumes:
  static_volume:
  media_volume:
  pgdata:

networks:
  backend:
