services:
  db:
    image: postgres:16-alpine
    env_file:
      - Config/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: ms-service:1.0.1
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - Config/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: >
      bash -c "if [ \"$${RUN_MIGRATIONS:-0}\" = \"1\" ]; then python manage.py migrate; fi &&
               python manage.py collectstatic --noinput &&
               gunicorn project_config.wsgi:application --bind 0.0.0.0:8000
               --worker-class $${GUNICORN_WORKER_CLASS:-gevent}
               --worker-connections $${GUNICORN_WORKER_CONNECTIONS:-1000}
               --workers $${GUNICORN_WORKERS:-3}
               --timeout $${GUNICORN_TIMEOUT:-120}"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    restart: always
    depends_on:
      web:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - backend
    restart: always
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

volumes:
  static_volume:
  media_volume:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  backend:
