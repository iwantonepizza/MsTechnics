# Production Nginx location snippets for mstechnics.ru.
# Copy these blocks into the TLS server block before the SPA fallback location.

location = /health/live {
    rewrite ^ /api/v1/health/live break;
    include proxy_params;
    proxy_pass http://unix:/run/gunicorn.sock;
}

location = /health/live/ {
    rewrite ^ /api/v1/health/live break;
    include proxy_params;
    proxy_pass http://unix:/run/gunicorn.sock;
}

location = /health/ready {
    rewrite ^ /api/v1/health/ready break;
    include proxy_params;
    proxy_pass http://unix:/run/gunicorn.sock;
}

location = /health/ready/ {
    rewrite ^ /api/v1/health/ready break;
    include proxy_params;
    proxy_pass http://unix:/run/gunicorn.sock;
}

location = /metrics {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    include proxy_params;
    proxy_pass http://unix:/run/gunicorn.sock;
}
