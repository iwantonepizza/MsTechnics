groups:
  - name: mstechnics
    rules:
      - alert: MsTechnicsNotificationAllChannelsFailed
        expr: increase(mstechnics_notification_all_channels_failed_total[10m]) > 5
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Notification delivery failed across every fallback channel"
          description: "More than 5 notifications failed across all channels in the last 10 minutes."

      - alert: MsTechnicsHigh5xxRate
        expr: |
          (
            sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(django_http_responses_total_by_status_view_method_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "High 5xx rate"
          description: "5xx responses exceed 5% of all responses for 5 minutes."

      - alert: MsTechnicsHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[10m])) by (le, view, method)
          ) > 2
        for: 10m
        labels:
          severity: medium
        annotations:
          summary: "High p95 latency"
          description: "95th percentile latency is above 2 seconds for at least one view."
