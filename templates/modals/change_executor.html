<div class="modal-header">
    <span>Изменение исполнителя у заявки {{ application_id }}</span>
    <span class="close-cross">&times;</span>
</div>
<div class="modal-body">
    <form action="{% url 'main:application:change_executor' %}" method="post">
        {% csrf_token %}
        <label>
            Комментарий
            <input style="background: rgba(187,187,187,0.49); color: rgba(255,255,255,0.89); width: 100%; height: 5vh"
                   name="comment" type="text">
        </label>
        <input type="hidden" name="application_id" value="{{ application_id }}">
        <label for="executor">Выберите исполнителя</label>
        <select name="executor" id="executor"
                style="background: rgba(187,187,187,0.49); color: rgba(255,255,255,0.89); width: 100%; height: 5vh">
            <option value="" {% if application.executor is None %}selected{% endif %}>Не выбран</option>
            {% for executor in executors %}
                <option value="{{ executor.id }}"
                        {% if application.executor and application.executor.id == executor.id %}selected{% endif %}>
                    {{ executor.first_name }} {{ executor.last_name }} {{ executor.executor_role }}
                    ({{ executor.phone_number }})
                </option>
            {% endfor %}
        </select>
    </form>
</div>
<div class="modal-footer">
    <button class="action-btn cancel" type="button" id="closeModalBtn">Отмена</button>
    <button class="action-btn submit-btn" type="button">Принять</button>
</div>
