<div class="modal-header">
    <span>Изменение исполнителя {{ departure_id }}</span>
    <span class="close-cross">&times;</span>
</div>
<div class="modal-body">
    <form action="{% url 'main:departure:change_executor' %}" method="post">
        {% csrf_token %}
        <label>
            <span>Комментарий</span>
            <input name="comment" type="text">
        </label>
        <br>
        <label for="executor">Выберите нового исполнителя</label>
        <select name="executor" id="executor"
                style="background: rgba(187,187,187,0.49); color: rgba(255,255,255,0.89); width: 100%; height: 5vh">
            {% for executor in executors %}
                <option value="{{ executor.id }}"
                        {% if departure.executor and departure.executor.id == executor.id %}selected{% endif %}>
                    {{ executor }} {{ executor.executor_role }}
                </option>
            {% endfor %}
        </select>
        <input type="hidden" id="departure-id" name="departure_id" value="{{ departure_id }}">
    </form>
</div>
<div class="modal-footer">
    <button class="action-btn cancel" type="button" id="closeModalBtn">Отмена</button>
    <button class="action-btn submit-btn" type="button">Принять</button>
</div>
